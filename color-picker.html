<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Generator PRO</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn-icons-png.flaticon.com/512/1203/1203887.png"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Roboto", sans-serif;
        background: #111;
        color: white;
        padding: 20px;
      }

      .container {
        margin: 0 auto;
        max-width: 800px;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      #picker {
        width: 120px;
        height: 80px;
        border: none;
        cursor: pointer;
      }
      .palette {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 10px;
        margin-top: 20px;
      }

      .palette :hover {
        transform: scale(1.05);
        font-weight: bold;
        font-size: larger;
      }

      .color {
        height: 85px;
        display: flex;
        align-items: end;
        justify-content: center;
        font-size: 12px;
        border-radius: 6px;
        cursor: pointer;
        padding: 6px;
      }
      .color:active {
        transform: scale(0.95);
      }

      .preview {
        padding: 20px;
        border-radius: 8px;
        width: 40%;
        height: 80px;
      }

      .buttonsRow {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 15px;
        cursor: pointer;
      }

      textarea {
        width: 100%;
        height: 180px;
        margin-top: 15px;
      }
      .code-container {
        position: relative;
        margin-top: 20px;
      }

      pre {
        background: #0d1117;
        padding: 20px;
        border-radius: 8px;
        overflow: auto;
      }

      code {
        font-family: monospace;
        color: #e6edf3;
        white-space: pre-wrap;
      }

      .copy-btn {
        position: absolute;
        top: 0;
        right: 10px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        font-size: 20px;
        cursor: pointer;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.25s;
      }
      .copy-btn:hover {
        background: #22c55e33;
        transform: scale(1.1);
      }
      hr {
        margin: 30px 0;
        border: none;
        border-top: 1px solid #333;
      }
      .theme-toggle {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        border: none;
        font-size: 20px;
        cursor: pointer;
        background: #222;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.25s;
      }

      .theme-toggle:hover {
        transform: scale(1.1);
      }

      #toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #111;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        opacity: 0;
        pointer-events: none;
        transition: 0.25s;
        backdrop-filter: blur(8px);
        font-weight: 500;
        font-size: 14px;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="controls">

        <pre>
        <code>
            <h1>hace falta corregir el toggle para cambiar el fondo a dia o noche, y buscar como inicializar el picker con otro color mas alegre</h1>
        </code>
        </pre>
        <br><br><br><br>

        <h2>🎨 Theme Generator PRO</h2>
        <button id="toggle" class="theme-toggle">🌙</button>
      </div>

      <div class="controls">
        <input type="color" id="picker" value="#3f51b5" />
        <div id="preview" class="preview">Preview Theme</div>
      </div>

      <div id="palette" class="palette"></div>

      <hr />
      <h3>Compatible Colors</h3>
      <div id="harmonies" class="palette"></div>

      <hr />
      <h3>Code Generator</h3>
      <div class="buttonsRow">
        <button id="export">Export Vuetify Theme</button>
        <button id="tokens">Generate Tokens</button>
      </div>
      <div class="code-container">
        <button id="copyBtn" class="copy-btn"></button>
        <pre><code id="output"></code></pre>
      </div>
      <div id="toast"></div>
    </div>
    <script>
      let currentTheme = {};

      // SVG COPY
      const copyIcon = `
        <svg xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 640 640"
        fill="white">
        <path d="M480 400L288 400C279.2 400 272 392.8 272 384L272 128C272 119.2 279.2 112 288 112L421.5 112C425.7 112 429.8 113.7 432.8 116.7L491.3 175.2C494.3 178.2 496 182.3 496 186.5L496 384C496 392.8 488.8 400 480 400zM288 448L480 448C515.3 448 544 419.3 544 384L544 186.5C544 169.5 537.3 153.2 525.3 141.2L466.7 82.7C454.7 70.7 438.5 64 421.5 64L288 64C252.7 64 224 92.7 224 128L224 384C224 419.3 252.7 448 288 448zM160 192C124.7 192 96 220.7 96 256L96 512C96 547.3 124.7 576 160 576L352 576C387.3 576 416 547.3 416 512L416 496L368 496L368 512C368 520.8 360.8 528 352 528L160 528C151.2 528 144 520.8 144 512L144 256C144 247.2 151.2 240 160 240L176 240L176 192L160 192z"/>
        </svg>
        `;

      // SVG CHECK
      const checkIcon = `
        <svg xmlns="http://www.w3.org/2000/svg"
        width="20"
        height="20"
        viewBox="0 0 640 640"
        fill="white">
        <path d="M530.8 134.1C545.1 144.5 548.3 164.5 537.9 178.8L281.9 530.8C276.4 538.4 267.9 543.1 258.5 543.9C249.1 544.7 240 541.2 233.4 534.6L105.4 406.6C92.9 394.1 92.9 373.8 105.4 361.3C117.9 348.8 138.2 348.8 150.7 361.3L252.2 462.8L486.2 141.1C496.6 126.8 516.6 123.6 530.9 134z"/>
        </svg>
        `;
      const copyBtn = document.getElementById("copyBtn");
      copyBtn.innerHTML = copyIcon;

      function renderCode(text) {
        document.getElementById("output").textContent = text;
      }

      function hexToHSL(H) {
        let r = 0,
          g = 0,
          b = 0;

        r = parseInt(H.substring(1, 3), 16) / 255;
        g = parseInt(H.substring(3, 5), 16) / 255;
        b = parseInt(H.substring(5, 7), 16) / 255;

        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);

        let h,
          s,
          l = (max + min) / 2;

        if (max === min) {
          h = s = 0;
        } else {
          const d = max - min;
          s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

          switch (max) {
            case r:
              h = (g - b) / d + (g < b ? 6 : 0);
              break;
            case g:
              h = (b - r) / d + 2;
              break;
            case b:
              h = (r - g) / d + 4;
              break;
          }

          h /= 6;
        }

        return {
          h: Math.round(h * 360),
          s: Math.round(s * 100),
          l: Math.round(l * 100),
        };
      }

      //  HSL -> HEX
      function HSLToHex(h, s, l) {
        s /= 100;
        l /= 100;

        const k = (n) => (n + h / 30) % 12;
        const a = s * Math.min(l, 1 - l);

        const f = (n) =>
          Math.round(
            255 *
              (l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)))),
          );

        return (
          "#" +
          [f(0), f(8), f(4)]
            .map((x) => x.toString(16).padStart(2, "0"))
            .join("")
            .toUpperCase()
        );
      }

      // WCAG CONTRAST RATIO: contraste real accesible
      function getContrast(hex) {
        const rgb = hex
          .replace("#", "")
          .match(/.{2}/g)
          .map((c) => parseInt(c, 16) / 255)
          .map((c) =>
            c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4),
          );

        const luminance = 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];

        return luminance > 0.179 ? "#000" : "#FFF";
      }

      // TAILWIND SCALE
      const scale = {
        25: 97,
        50: 95,
        100: 90,
        200: 80,
        300: 70,
        400: 60,
        500: 50,
        600: 40,
        700: 30,
        800: 20,
        900: 12,
        950: 8,
      };

      let dark = false;
      function generatePalette(base) {
        const { h, s } = hexToHSL(base);

        const palette = document.getElementById("palette");
        palette.innerHTML = "";
        const vuetifyTheme = {};

        Object.entries(scale).forEach(([key, lightness]) => {
          const color = HSLToHex(h, s, lightness);
          vuetifyTheme[key] = color;
          const div = document.createElement("div");
          div.className = "color";
          div.dataset.color = color;
          div.style.background = color;
          div.style.color = getContrast(color);
          div.textContent = `${key} ${color}`;
          //   div.onclick = () => navigator.clipboard.writeText(color);
          palette.appendChild(div);
        });
        updatePreview(vuetifyTheme[500]);
        currentTheme = vuetifyTheme;
        drawHarmonies(base);
      }

      // PREVIEW DARK MODE

      function updatePreview(primary) {
        const preview = document.getElementById("preview");
        preview.style.background = dark ? "#121212" : primary;
        preview.style.border = `4px solid ${primary}`;
        preview.style.color = getContrast(dark ? "#121212" : primary);
        preview.innerHTML = `
            Mode: ${dark ? "Dark" : "Light"} <br>
            Primary: ${primary}
        `;
      }

      // EXPORT VUETIFY
      document.getElementById("export").onclick = () => {
        const code = `
        export default {
            theme:{
                themes:{
                    ${dark ? "dark" : "light"}:{
                    primary:"${currentTheme[500]}",
                    secondary:"${currentTheme[700]}",
                    accent:"${currentTheme[300]}"
                    }
                }
            }
        }`;
        renderCode(code);
      };

      // EVENTS
      const state = {
        baseColor: "#00ff41",
        dark: false,
      };
      function update() {
        generatePalette(state.baseColor);
      }
      const picker = document.getElementById("picker");

      picker.addEventListener("input", (e) => {
        state.baseColor = e.target.value;
        update();
      });
      generatePalette(picker.value);

      // GENERAR HARMONIES
      function shiftHue(h, degree) {
        return (h + degree + 360) % 360;
      }
      function generateHarmonies(base) {
        const { h } = hexToHSL(base);
        const s = 65; // saturación consistente
        const l = 50; // brillo usable

        return {
          complementary: HSLToHex(shiftHue(h, 180), s, l),
          analogous1: HSLToHex(shiftHue(h, 30), s, l),
          analogous2: HSLToHex(shiftHue(h, -30), s, l),
          triadic1: HSLToHex(shiftHue(h, 120), s, l),
          triadic2: HSLToHex(shiftHue(h, 240), s, l),
        };
      }

      // DRAW HARMONIES
      function drawHarmonies(base) {
        const container = document.getElementById("harmonies");
        container.innerHTML = "";
        const colors = generateHarmonies(base);
        Object.entries(colors).forEach(([name, color]) => {
          const div = document.createElement("div");
          div.className = "color";
          div.dataset.color = color;
          div.style.background = color;
          div.style.color = getContrast(color);
          div.textContent = `${name} ${color}`;
          div.onclick = () => navigator.clipboard.writeText(color);
          container.appendChild(div);
        });
      }

      function enableCopy(containerId) {
        const container = document.getElementById(containerId);
        container.addEventListener("click", async (e) => {
          const colorBox = e.target.closest(".color");
          if (!colorBox) return;
          const color = colorBox.dataset.color;

          await navigator.clipboard.writeText(color);
          showToast(`Copiado ${color}`, color);
          colorBox.style.transform = "scale(1.1)";
          setTimeout(() => {
            colorBox.style.transform = "";
          }, 200);
        });
      }
      enableCopy("palette");
      enableCopy("harmonies");

      let toastTimeout;
      function showToast(message, color = null) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        if (color) {
          toast.style.background = color + "22";
          toast.style.border = `1px solid ${color}`;
          toast.style.color = getContrast(color);
        } else {
          toast.style.background = "#111";
          toast.style.border = "none";
          toast.style.color = "white";
        }
        toast.classList.add("show");
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
          toast.classList.remove("show");
        }, 1500);
      }

      //Generator real de tokens
      document.getElementById("tokens").onclick = () => {
        const tokens = {
          color: {
            primary: currentTheme[500],
            primaryHover: currentTheme[400],
            primaryActive: currentTheme[700],
            background: dark ? "#121212" : "#FFFFFF",
            surface: dark ? "#1E1E1E" : "#F5F5F5",
          },
        };

        renderCode(JSON.stringify(tokens, null, 2));
        console.log(typeof renderCode);
      };
      copyBtn.onclick = async () => {
        const text = document.getElementById("output").textContent;

        await navigator.clipboard.writeText(text);
        showToast(`Copiado ${color}`, color);
        copyBtn.innerHTML = checkIcon;
        setTimeout(() => {
          copyBtn.innerHTML = copyIcon;
        }, 1500);
      };

      // toggle dark mode
      const toggleBtn = document.getElementById("toggle");
      function toggleTheme() {
        state.dark = !state.dark;
        dark = state.dark;
        toggleBtn.textContent = dark ? "☀️" : "🌙";
        update();
      }
      toggleBtn.addEventListener("click", toggleTheme);
      toggleBtn.textContent = dark ? "☀️" : "🌙";
    </script>
  </body>
</html>
