<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dev Dashboard</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://cdn-icons-png.flaticon.com/512/619/619175.png"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background: #000;
        color: #28ff00;
        font-family: "Share Tech Mono", monospace;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #time {
        font-size: clamp(3rem, 8vw, 7rem);
      }

      #date {
        font-size: clamp(1.2rem, 3vw, 2rem);
        opacity: 0.7;
      }

      #weather {
        margin-top: 1.5rem;
        font-size: 1.5rem;
        opacity: 0.8;
      }

      @media (max-width: 900px) {
        #weather {
          text-align: center;
          width: 90%;
          margin-inline: auto;
        }
      }

      #quote {
        margin-top: 1.5rem;
        opacity: 0.4;
        text-align: center;
        max-width: 600px;
      }
      #try {
        opacity: 0.1;
      }
      .shortcuts {
        position: absolute;
        bottom: 40px;
        display: flex;
        gap: 1.5rem;

        @media (max-width: 600px) {
          display: none;
          /* flex-direction: column;  */
        }
      }

      a {
        color: #28ff00;
        text-decoration: none;
        border: 1px solid #28ff00;
        padding: 10px 20px;
        transition: 0.2s;
      }

      a:hover {
        background: #28ff00;
        color: #000;
      }
      .terminal {
        background-color: #050505;
        position: absolute;
        bottom: 120px;
        width: 600px;
        max-width: 90%;
        font-size: 1rem;
        cursor: text;
        /* border: 1px solid #28ff00; */
        border-radius: 8px;
        padding: 0 0.5rem;
      }

      #terminal-output {
        min-height: 80px;
        margin-bottom: 10px;
      }

      .terminal-input-line {
        display: flex;
        align-items: center;
        gap: 6px;
        position: relative;
      }

      #terminal-input {
        background: transparent;
        border: none;
        outline: none;
        width: 100%;
        font-family: inherit;
        color: transparent;
        caret-color: transparent;
      }
      .input-wrapper {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      #fake-input {
        white-space: pre;
      }

      .cursor {
        position: absolute;
        bottom: 2px;
        width: 10px;
        height: 2px;
        background: #28ff00;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      #matrix {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }
    </style>
  </head>

  <body>
    <!-- clock, date, weather, quote -->
    <div id="time"></div>
    <div id="date"></div>
    <div id="weather">Loading weather...</div>
    <div id="quote"></div>

    <!-- terminal interface -->
    <div class="terminal">
      <div id="terminal-output"></div>
      <div class="terminal-input-line">
        <span class="prompt">&gt;</span>
        <span id="fake-input"></span>
        <span class="cursor"></span>
        <input id="terminal-input" autofocus />
      </div>
      <p id="try">try 'matrix' for a cool animation or 'stop' to quit</p>
    </div>

    <!-- matrix background which I really love and wanted to implement for a long time -->
    <canvas id="matrix"></canvas>

    <!-- shortcuts buttons -->
    <div class="shortcuts">
      <a href="https://github.com">GitHub</a>
      <a href="https://stackoverflow.com">StackOverflow</a>
      <a href="https://www.youtube.com">YouTube</a>
      <a href="https://mail.google.com">Gmail</a>
    </div>

    <script>
      // clock system with formatted time and date
      const WEEK = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
      const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC",];

      function pad(n) {
        return String(n).padStart(2, "0");
      }

      function updateClock() {
        const now = new Date();

        let hours = now.getHours();
        const ampm = hours >= 12 ? "PM" : "AM";
        hours = hours % 12 || 12;

        time.textContent = `${pad(hours)}:${pad(now.getMinutes())}:${pad(now.getSeconds())} ${ampm}`;

        date.textContent = `${WEEK[now.getDay()]} ${MONTHS[now.getMonth()]}-${pad(now.getDate())}-${now.getFullYear()}`;
      }

      setInterval(updateClock, 1000);
      updateClock();

      // cities for weather randomization, you can add more if you want, just make sure to include the name, latitude and longitude for each city
      const WORLD_CITIES = [
        { name: "New York", lat: 40.7128, lon: -74.006 },
        { name: "London", lat: 51.5072, lon: -0.1276 },
        { name: "Tokyo", lat: 35.6762, lon: 139.6503 },
        { name: "Paris", lat: 48.8566, lon: 2.3522 },
        { name: "Berlin", lat: 52.52, lon: 13.405 },
        { name: "Dubai", lat: 25.2048, lon: 55.2708 },
        { name: "Sydney", lat: -33.8688, lon: 151.2093 },
        { name: "Mexico City", lat: 19.4326, lon: -99.1332 },
        { name: "Toronto", lat: 43.651, lon: -79.347 },
        { name: "Los Angeles", lat: 34.0522, lon: -118.2437 },
        { name: "San Francisco", lat: 37.7749, lon: -122.4194 },
        { name: "São Paulo", lat: -23.5505, lon: -46.6333 },
        { name: "Buenos Aires", lat: -34.6037, lon: -58.3816 },
        { name: "Madrid", lat: 40.4168, lon: -3.7038 },
        { name: "Rome", lat: 41.9028, lon: 12.4964 },
        { name: "Moscow", lat: 55.7558, lon: 37.6173 },
        { name: "Singapore", lat: 1.3521, lon: 103.8198 },
        { name: "Seoul", lat: 37.5665, lon: 126.978 },
        { name: "Cape Town", lat: -33.9249, lon: 18.4241 },
        { name: "Mumbai", lat: 19.076, lon: 72.8777 },
        { name: "Bangkok", lat: 13.7563, lon: 100.5018 },
      ];

      // weather system that fetches current weather for user's location and 2 random cities from the list every time you load the page, also updates every 6 seconds to keep it fresh
      let userLocation = null;
      async function getUserLocation() {
        if (userLocation) return userLocation;
        if (!navigator.geolocation) return null;
        try {
          const position = await new Promise((resolve, reject) =>
            navigator.geolocation.getCurrentPosition(resolve, reject),
          );
          userLocation = {
            lat: position.coords.latitude,
            lon: position.coords.longitude,
          };

          return userLocation;
        } catch {
          return null;
        }
      }

      let userCity = null;
      async function getCityName(lat, lon) {
        if (userCity) return userCity;
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`,
          );
          const data = await res.json();
          userCity =
            data.address.city ||
            data.address.town ||
            data.address.village ||
            data.address.state ||
            "Local";
          return userCity;
        } catch (err) {
          console.error(err);
          return "Local";
        }
      }
      async function getWeather(lat, lon, name) {
        const params = new URLSearchParams({
          latitude: lat,
          longitude: lon,
          current_weather: true,
        });
        const res = await fetch(
          `https://api.open-meteo.com/v1/forecast?${params}`,
        );
        const data = await res.json();
        const weather = data.current_weather;
        if (!weather) {
          return `${name}: unavailable`;
        }
        const temp = weather.temperature;
        const wind = weather.windspeed;
        const direction = weather.winddirection;
        const code = weather.weathercode;
        return `${name}: ${temp}°C`;
        // return `${name}: 🌡 ${temp}°C, 💨 ${wind}km/h, 🧭 ${direction}°, code:${code}`;
      }
      function getRandomCities(array, count) {
        const shuffled = [...array].sort(() => Math.random() - 0.5);
        return shuffled.slice(0, count);
      }

      async function loadWeather() {
        const weatherEl = document.getElementById("weather");

        try {
          const requests = [];
          const location = await getUserLocation();
          if (location) {
            const cityName = await getCityName(location.lat, location.lon);
            requests.push(getWeather(location.lat, location.lon, cityName));
          }
          const randomCities = getRandomCities(WORLD_CITIES, 2);
          randomCities.forEach((city) => {
            requests.push(getWeather(city.lat, city.lon, city.name));
          });
          const results = await Promise.all(requests);
          weatherEl.textContent = results.join(" | ");
        } catch (err) {
          console.error(err);
          weatherEl.textContent = "Weather unavailable";
        }
      }

      let intervalId;
      function startWeather() {
        loadWeather();
        intervalId = setInterval(loadWeather, 60000);
      }
      function stopWeather() {
        clearInterval(intervalId);
      }
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopWeather();
        } else {
          startWeather();
        }
      });
      startWeather();
      setInterval(loadWeather, 60000);

      // Dev quotes, just a random one from the list every time you load the page
      document.addEventListener("DOMContentLoaded", () => {
        const quotes = [
          "Ship early. Ship often.",
          "Make it work. Make it right. Make it fast.",
          "Code is poetry.",
          "Stay curious.",
          "Small commits save lives.",
          "Debugging builds character.",
          "First solve the problem, then write the code.",
          "Programs must be written for people to read.",
          "Simplicity is the soul of efficiency.",
          "Code never lies, comments sometimes do.",
          "Fix the cause, not the symptom.",
          "Good code is its own best documentation.",
          "Deleted code is debugged code.",
          "First make it correct, then fast.",
          "Experience is the name everyone gives to their mistakes.",
          "Talk is cheap. Show me the code.",
          "Before software can be reusable it first has to be usable.",
          "Automation is good, so long as you know exactly where to put the machine.",
          "The best error message is the one that never shows up.",
          "Learning never exhausts the mind.",
          "Any fool can write code that a computer understands.",
          "Clean code always looks like it was written by someone who cares.",
          "If debugging is removing bugs, programming must be adding them.",
          "Programming isn't about typing, it's about thinking.",
          "Code less, think more.",
          "Small steps every day.",
          "Make it simple but significant.",
          "Consistency beats intensity.",
          "Stay hungry. Stay foolish.",
          "Build things people need.",
          "Perfect is the enemy of done.",
          "Version control saves friendships.",
          "Write code like the next person maintaining it is a psychopath.",
          "Optimization without measurement is guessing.",
          "Readable code > clever code.",
          "Every expert was once a beginner.",
          "Discipline equals freedom.",
        ];
        const quote = document.querySelector("#quote");
        if (quote) {
          quote.textContent = `"${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        }
        if (!quote) {
          console.warn("Quote element not found");
          return;
        }
        // console.log(document.querySelector("#quote"));
      });

      //  Terminal engine with commands, shortcuts, autocomplete and command history
      const input = document.getElementById("terminal-input");
      const output = document.getElementById("terminal-output");
      const fakeInput = document.getElementById("fake-input");
      const cursor = document.querySelector(".cursor");
      const commandHistory = [];
      let historyIndex = -1;

      input.addEventListener("input", () => {
        fakeInput.textContent = input.value;
      });
      const prompt = document.querySelector(".prompt");

      document.querySelectorAll(".shortcuts a").forEach((link) => {
        link.target = "_blank";
        link.rel = "noopener noreferrer";
      });

      function updateCursor() {
        fakeInput.textContent = input.value || "";
        const textWidth = fakeInput.offsetWidth;
        const promptWidth = prompt.offsetWidth;
        cursor.style.left = promptWidth + textWidth + "px";
      }

      ["input", "focus", "click", "keyup"].forEach((event) => {
        input.addEventListener(event, updateCursor);
      });
      updateCursor();
      document.addEventListener("click", () => {
        input.focus();
      });

      const commands = {
        help: () =>
          "Commands: help, hello, clear, time, date, matrix, stop | Shortcuts: git, gpt, mail, stack, | try g something to search on Google, yt for YouTube, gh for GitHub, npm for npmjs, mdn for MDN, so or stack for StackOverflow",
        github: () => {
          window.location.href = "https://github.com";
        },
        gmail: () => {
          window.location.href = "https://mail.google.com";
        },
        chatgpt: () => {
          window.location.href = "https://chat.openai.com";
        },
        time: () => new Date().toLocaleTimeString(),
        date: () => new Date().toLocaleDateString(),
        clear: () => {
          output.innerHTML = "";
          return "";
        },
        hello: () => {
          output.innerHTML = "";
          return "Hello there! Welcome to your Dev Dashboard";
        },
        matrix: () => {
          if (matrixInterval) {
            return "Matrix already running";
          }
          startMatrix();
          return "Matrix rain started";
        },
        stop: () => {
          if (!matrixInterval) {
            return "Error: Matrix is not running";
          }
          stopMatrix();
          return "Matrix stopped";
        },
      };
      const shortcuts = {
        git: "https://github.com",
        github: "https://github.com",
        gpt: "https://chat.openai.com",
        chatgpt: "https://chat.openai.com",
        mail: "https://mail.google.com",
        gmail: "https://mail.google.com",
        stack: "https://stackoverflow.com",
        so: "https://stackoverflow.com",
      };
      const commandList = [...Object.keys(commands), ...Object.keys(shortcuts)];

      // prints text in terminal output
      function print(text) {
        const line = document.createElement("div");
        line.textContent = text;
        output.appendChild(line);
      }

      // Listener for commands execution on Enter key
      input.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;

        const cmd = input.value.trim().toLowerCase();

        if (cmd) {
          commandHistory.push(cmd);
          historyIndex = commandHistory.length;
        }

        print("> " + cmd);

        if (commands[cmd]) {
          const result = commands[cmd]();
          if (result) print(result);
        } else if (shortcuts[cmd]) {
          print("Opening " + cmd + "...");
          window.open(shortcuts[cmd], "_blank", "noopener,noreferrer");
        } else if (handleSearch(cmd)) {
          print("Searching...");
        } else {
          print("Command not found");
        }

        function resetInput() {
          input.value = "";
          fakeInput.textContent = "";
        }
        resetInput();
        updateCursor();
      });

      //  Autocomplete with Tab key, matches commands and shortcuts
      input.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();

          const value = input.value.toLowerCase();
          const match = commandList.find((cmd) => cmd.startsWith(value));

          if (match) input.value = match;
          fakeInput.textContent = match;
          updateCursor();
        }
      });

      // ArrowUp and ArrowDown for command history
      input.addEventListener("keydown", (e) => {
        if (e.key === "ArrowUp") {
          e.preventDefault();

          if (historyIndex > 0) {
            historyIndex--;
            input.value = commandHistory[historyIndex];
          }

          fakeInput.textContent = input.value;
          updateCursor();
        }

        if (e.key === "ArrowDown") {
          e.preventDefault();

          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            input.value = commandHistory[historyIndex];
          } else {
            historyIndex = commandHistory.length;
            input.value = "";
          }

          fakeInput.textContent = input.value;
          updateCursor();
        }
      });

      // Matrix rain effect, works with 'matrix' and 'stop' commands in terminal
      const canvas = document.getElementById("matrix");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const chars =
        "0123456789" +
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ" +
        "abcdefghijklmnopqrstuvwxyz" +
        "!@#$%^&*()_+-=[]{}<>?/|" +
        "░▒▓█▄▀■□◆◇○●◢◣◤◥" +
        "⟟⟒⟟⟟⟒⟟⟟⟒" +
        "诶比西迪伊吉艾杰开哦屁提维维克斯吾艾尔艾娜欧米伽" +
        "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜ" +
        "アイウエオカキクケコサシスセソタチツテト" +
        "αβγδεζηθικλμνξοπρστυφχψω" +
        "ΑΒΓΔΕΖΗΘΙΚΛΜΝΞΟΠΡΣΤΥΦΧΨΩ" +
        "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ" +
        "абвгдежзийклмнопрстуфхцчшщъыьэюя" +
        "ابتثجحخدذرزسشصضطظعغفقكلمنهوي" +
        "アイウエオカキクケコサシスセソタチツテトナニヌネノ" +
        "ハヒフヘホマミムメモヤユヨラリルレロワヲン" +
        "あいうえおかきくけこさしすせそたちつてとなにぬねの" +
        "가나다라마바사아자차카타파하" +
        "∑∏√∞≈≠≤≥∫∆∇∂µπΩ" +
        "ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏ" +
        "⠁⠃⠇⠉⠙⠑⠓⠕⠗⠞⠺⠵";

      const fontSize = 16;
      const columns = canvas.width / fontSize;

      const drops = Array(Math.floor(columns)).fill(1);

      let matrixInterval = null;

      function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#28ff00";
        ctx.font = fontSize + "px monospace";

        drops.forEach((y, i) => {
          const text = chars.charAt(Math.floor(Math.random() * chars.length));
          ctx.fillStyle = `rgba(40,255,0,${Math.random()})`;
          const x = i * fontSize;
          ctx.fillText(text, x, y * fontSize);
          if (y * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i] += Math.random() * 1.5;
        });
      }
      function startMatrix() {
        if (matrixInterval) return;
        matrixInterval = setInterval(drawMatrix, 33);
      }
      function stopMatrix() {
        clearInterval(matrixInterval);
        matrixInterval = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      // Search handler for commands like "g something" to search "something" on Google, "yt something" for YouTube, gh for GitHub, npm for npmjs, mdn for MDN, so or stack for StackOverflow
      function handleSearch(cmd) {
        const [command, ...queryParts] = cmd.split(" ");
        const query = queryParts.join(" ");
        if (!query) return false;

        const engines = {
          g: `https://www.google.com/search?q=${query}`,
          yt: `https://www.youtube.com/results?search_query=${query}`,
          gh: `https://github.com/search?q=${query}`,
          npm: `https://www.npmjs.com/search?q=${query}`,
          mdn: `https://developer.mozilla.org/en-US/search?q=${query}`,
          so: `https://stackoverflow.com/search?q=${query}`,
          stack: `https://stackoverflow.com/search?q=${query}`,
        };
        if (engines[command]) {
          window.open(engines[command], "_blank");
          return true;
        }
        return false;
      }
    </script>
  </body>
</html>
<!-- enjoy -->
